<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 560" font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace">
  <!-- Window frame -->
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="20" flood-color="#000" flood-opacity="0.35"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1000" height="560" fill="#0b0b0d"/>

  <!-- Terminal window -->
  <g filter="url(#shadow)">
    <rect x="60" y="40" width="880" height="480" rx="12" fill="#1a1a1d" stroke="#2a2a2e" stroke-width="1"/>

    <!-- Title bar -->
    <rect x="60" y="40" width="880" height="36" rx="12" fill="#232327"/>
    <rect x="60" y="58" width="880" height="18" fill="#232327"/>

    <!-- Traffic lights -->
    <circle cx="84" cy="58" r="6" fill="#ff5f56"/>
    <circle cx="104" cy="58" r="6" fill="#ffbd2e"/>
    <circle cx="124" cy="58" r="6" fill="#27c93f"/>

    <!-- Title -->
    <text x="500" y="63" text-anchor="middle" fill="#8a8a8e" font-size="12">~/.claude/hooks — tail -f voice.log</text>

    <!-- Log content -->
    <g font-size="14">
      <!-- prompt row -->
      <text x="90" y="110" fill="#27c93f">punith@axe</text>
      <text x="175" y="110" fill="#8a8a8e">hooks</text>
      <text x="220" y="110" fill="#f5f5f7">$ tail -f voice.log</text>

      <!-- Log lines -->
      <text x="90" y="150" fill="#5a5a5e">[00:18:06]</text>
      <text x="180" y="150" fill="#e8e8ea">Shipment of all three projects has been successfully processed, sir.</text>

      <text x="90" y="180" fill="#5a5a5e">[00:26:12]</text>
      <text x="180" y="180" fill="#e8e8ea">Sir, Romeo and Oscar validation batches processing in parallel.</text>

      <text x="90" y="210" fill="#5a5a5e">[00:30:06]</text>
      <text x="180" y="210" fill="#e8e8ea">Validation of Romeo, Oscar and Quebec systems proceeding, sir.</text>

      <text x="90" y="240" fill="#5a5a5e">[00:37:19]</text>
      <text x="180" y="240" fill="#e8e8ea">All three hero demos have passed validation, sir.</text>

      <text x="90" y="270" fill="#5a5a5e">[00:57:52]</text>
      <text x="180" y="270" fill="#e8e8ea">Memory index now reflects the latest file modifications, sir.</text>

      <text x="90" y="300" fill="#5a5a5e">[03:58:42]</text>
      <text x="180" y="300" fill="#e8e8ea">Sir, all five Witness research reports synthesised for reference.</text>

      <text x="90" y="330" fill="#5a5a5e">[04:11:33]</text>
      <text x="180" y="330" fill="#e8e8ea">Axe, sir, all critical issues resolved, zero remaining.</text>

      <text x="90" y="360" fill="#5a5a5e">[04:17:34]</text>
      <text x="180" y="360" fill="#e8e8ea">Server shutdown initiated, sir, all systems offline now.</text>

      <text x="90" y="390" fill="#5a5a5e">[04:21:33]</text>
      <text x="180" y="390" fill="#e8e8ea">Shipping confirmation received, sir.</text>

      <!-- live tail cursor -->
      <text x="90" y="430" fill="#0a84ff">[04:22:01]</text>
      <text x="180" y="430" fill="#0a84ff">Standing by, sir.</text>
      <rect x="365" y="419" width="8" height="14" fill="#0a84ff">
        <animate attributeName="opacity" values="1;0;1" dur="1s" repeatCount="indefinite"/>
      </rect>
    </g>

    <!-- Footer label -->
    <text x="90" y="490" fill="#5a5a5e" font-size="11">
      live stream · generated by llama-3.1-8b-instant · spoken by en-GB-RyanNeural
    </text>
  </g>
</svg>
